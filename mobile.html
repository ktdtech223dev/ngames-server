<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>N Games — God Panel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#80e060;
  --bg:#0e0e0e;--bg2:#1a1a1a;--bg3:#222;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.13);
  --text1:rgba(255,255,255,0.92);--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.28);
  --green:#3ddc84;--gold:#f0c040;--red:#e04040;--blue:#40c0e0;
}
html,body{height:100%;background:var(--bg);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;overscroll-behavior:none;}
::-webkit-scrollbar{display:none;}
#pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:100;}
.pin-logo{font-size:20px;font-weight:800;letter-spacing:0.06em;text-align:center;}
.pin-logo span{color:var(--acc);}
.pin-sub{font-size:10px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;text-align:center;margin-top:4px;}
.pin-dots{display:flex;gap:12px;}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--border-h);transition:background 0.12s;}
.pin-dot.filled{background:var(--acc);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px;}
.pin-key{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:18px;font-weight:600;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.1s;}
.pin-key:active{background:var(--bg3);}
.pin-key.wide{grid-column:span 2;}
.pin-key.del{color:var(--text2);}
.pin-error{color:var(--red);font-size:12px;height:16px;}
#app{display:none;flex-direction:column;height:100vh;}
#app.visible{display:flex;}
#header{padding:max(env(safe-area-inset-top),14px) 16px 10px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-logo{font-size:14px;font-weight:800;letter-spacing:0.06em;flex:1;}
.hdr-logo span{color:var(--acc);}
.hdr-badge{font-size:9px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;padding:3px 7px;border:1px solid var(--border);border-radius:4px;}
#profile-bar{display:flex;gap:7px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.p-chip{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);cursor:pointer;white-space:nowrap;font-size:12px;font-weight:600;-webkit-tap-highlight-color:transparent;}
.p-chip.active{border-color:var(--chip-color);background:rgba(255,255,255,0.05);}
.p-chip-dot{width:7px;height:7px;border-radius:50%;}
#tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tab-btn{flex:1;min-width:50px;padding:11px 4px;font-size:10px;font-weight:700;letter-spacing:0.05em;color:var(--text3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.tab-btn.active{color:var(--acc);border-bottom-color:var(--acc);}
#content{flex:1;overflow-y:auto;padding:14px;padding-bottom:max(env(safe-area-inset-bottom),14px);}
.sec{margin-bottom:18px;}
.sec-label{font-size:9px;font-weight:700;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;margin-bottom:8px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:8px;}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border);}
.card-row:last-child{border-bottom:none;}
.row-label{font-size:12px;color:var(--text2);}
.row-val{font-size:12px;font-weight:600;}
.row-val.green{color:var(--green);}
.row-val.red{color:var(--red);}
.row-val.gold{color:var(--gold);}
.row-val.muted{color:var(--text3);}
.server-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.server-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.server-name{font-size:13px;font-weight:700;}
.server-url{font-size:10px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.server-status{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.status-pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;}
.status-pill.online{background:rgba(61,220,132,0.15);color:var(--green);border:1px solid rgba(61,220,132,0.3);}
.status-pill.offline{background:rgba(224,64,64,0.12);color:var(--red);border:1px solid rgba(224,64,64,0.25);}
.status-pill.checking{background:rgba(240,192,64,0.12);color:var(--gold);border:1px solid rgba(240,192,64,0.25);}
.ping-lbl{font-size:10px;color:var(--text3);}
.crew-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:8px;}
.crew-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;border:2px solid transparent;position:relative;}
.crew-av.online{border-color:var(--av-color);}
.av-dot{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg2);}
.online .av-dot{background:var(--green);}
.offline .av-dot{background:var(--text3);}
.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:10px;}
.game-hdr{display:flex;align-items:center;gap:10px;padding:12px 13px;border-bottom:1px solid var(--border);}
.session-row{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--border);}
.session-row:last-child{border-bottom:none;}
.session-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.wall-composer{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:12px;}
.wall-composer textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text1);font-size:13px;resize:none;font-family:inherit;line-height:1.5;min-height:65px;}
.wall-composer textarea::placeholder{color:var(--text3);}
.wall-footer{display:flex;justify-content:flex-end;margin-top:8px;}
.post-btn{padding:8px 18px;border:none;border-radius:8px;background:var(--acc);color:#000;font-size:12px;font-weight:700;cursor:pointer;}
.wall-post{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:9px;}
.post-hdr{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.post-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.post-content{font-size:13px;color:var(--text2);line-height:1.5;}
.post-reactions{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;}
.react-btn{padding:4px 9px;border:1px solid var(--border);border-radius:16px;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.react-btn.active{border-color:var(--acc);color:var(--acc);background:rgba(128,224,96,0.07);}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;}
.lb-rank{width:22px;text-align:center;font-size:12px;font-weight:700;color:var(--text3);}
.lb-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.msg-contact{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.msg-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);flex-shrink:0;}
.convo-hdr{display:flex;align-items:center;gap:10px;padding:12px 0 13px;border-bottom:1px solid var(--border);margin-bottom:13px;cursor:pointer;}
.convo-back{font-size:20px;color:var(--text2);}
.msg-bubble{max-width:80%;padding:9px 13px;border-radius:14px;margin-bottom:7px;font-size:13px;line-height:1.5;display:block;}
.msg-bubble.me{margin-left:auto;background:var(--acc);color:#000;border-radius:14px 14px 3px 14px;}
.msg-bubble.them{background:var(--bg3);border:1px solid var(--border);border-radius:14px 14px 14px 3px;}
.msg-time{font-size:9px;opacity:0.45;margin-top:3px;}
.msg-history{display:flex;flex-direction:column;margin-bottom:12px;}
.msg-input-row{display:flex;gap:9px;align-items:center;position:sticky;bottom:0;background:var(--bg);padding:10px 0 4px;}
.msg-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:9px 15px;color:var(--text1);font-size:13px;font-family:inherit;outline:none;}
.msg-send{width:38px;height:38px;border-radius:50%;border:none;background:var(--acc);color:#000;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.empty{text-align:center;color:var(--text3);padding:32px 16px;font-size:12px;}
</style>
</head>
<body>
<div id="pin-screen">
  <div><div class="pin-logo">N <span>GAMES</span></div><div class="pin-sub">God Panel</div></div>
  <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-pad">
    <div class="pin-key" onclick="pinKey('1')">1</div><div class="pin-key" onclick="pinKey('2')">2</div><div class="pin-key" onclick="pinKey('3')">3</div>
    <div class="pin-key" onclick="pinKey('4')">4</div><div class="pin-key" onclick="pinKey('5')">5</div><div class="pin-key" onclick="pinKey('6')">6</div>
    <div class="pin-key" onclick="pinKey('7')">7</div><div class="pin-key" onclick="pinKey('8')">8</div><div class="pin-key" onclick="pinKey('9')">9</div>
    <div class="pin-key wide" onclick="pinKey('0')">0</div><div class="pin-key del" onclick="pinDel()">⌫</div>
  </div>
</div>

<div id="app">
  <div id="header"><div class="hdr-logo">N <span>GAMES</span></div><div class="hdr-badge">GOD PANEL</div></div>
  <div id="profile-bar"></div>
  <div id="tabs">
    <div class="tab-btn active" onclick="switchTab('god')">GOD</div>
    <div class="tab-btn" onclick="switchTab('crew')">CREW</div>
    <div class="tab-btn" onclick="switchTab('games')">GAMES</div>
    <div class="tab-btn" onclick="switchTab('wall')">WALL</div>
    <div class="tab-btn" onclick="switchTab('scores')">SCORES</div>
    <div class="tab-btn" onclick="switchTab('dms')">DMS</div>
  </div>
  <div id="content">
    <div id="tab-god"></div>
    <div id="tab-crew" style="display:none"></div>
    <div id="tab-games" style="display:none"></div>
    <div id="tab-wall" style="display:none"></div>
    <div id="tab-scores" style="display:none"></div>
    <div id="tab-dms" style="display:none"></div>
  </div>
</div>

<script>
const CREW = [
  { id:'keshawn', name:'Keshawn', color:'#80e060', suit:'♣', initial:'K' },
  { id:'sean',    name:'Sean',    color:'#f0c040', suit:'♦', initial:'S' },
  { id:'dart',    name:'Dart',    color:'#e04040', suit:'♥', initial:'D' },
  { id:'amari',   name:'Amari',   color:'#40c0e0', suit:'♠', initial:'A' },
];

// To add a new server to the God Panel, add an entry here
const SERVERS = [
  { id:'ngames',       name:'N Games Network',  url:'',                                                               emoji:'🌐', health:'/health' },
  { id:'chaos-casino', name:'Chaos Casino',       url:'https://chaos-holdem-server3-production.up.railway.app',         emoji:'🃏', health:'/' },
  { id:'project-x',    name:"Black's Arena",        url:'https://ngames-server-production.up.railway.app',                emoji:'🎯', health:'/health' },
];

let currentProfile=null, presence={}, profiles={}, wallPosts=[], allGames=[], _lbRows=[];
let activeConvo=null, currentTab='god', ws=null, pinBuffer='', _unread={};
let serverStatus={};

// ── App config (launcher title) ───────────────────────────────────────────────
const NGAMES_URL = '';  // empty = same origin
const ADMIN_KEY  = 'ngames-admin'; // matches ADMIN_KEY env var on server
let _appConfig   = {};

async function fetchAppConfig() {
  try {
    const r = await fetch('/config');
    _appConfig = await r.json();
  } catch(e) {}
}

async function setArenaTitle() {
  const input  = document.getElementById('arena-title-input');
  const status = document.getElementById('arena-title-status');
  const value  = (input?.value || '').trim();
  if (!value) return;
  if (status) status.textContent = 'Saving...';
  try {
    const r = await fetch('/config/project-x', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: value, admin_key: ADMIN_KEY }),
    });
    const data = await r.json();
    if (data.ok) {
      _appConfig['project-x:title'] = value;
      if (status) { status.textContent = `✓ Set to "${value}" — live for all Arena players`; status.style.color = '#80e060'; }
    } else {
      if (status) { status.textContent = data.error || 'Failed'; status.style.color = '#e04040'; }
    }
  } catch(e) {
    if (status) { status.textContent = 'Error: ' + e.message; status.style.color = '#e04040'; }
  }
}

async function setLauncherTitle() {
  const input  = document.getElementById('title-input');
  const status = document.getElementById('title-status');
  const value  = (input?.value || '').trim();
  if (!value) return;
  if (status) status.textContent = 'Saving...';
  try {
    const r = await fetch('/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'launcher_title', value, admin_key: ADMIN_KEY }),
    });
    const data = await r.json();
    if (data.ok) {
      _appConfig.launcher_title = value;
      if (status) { status.textContent = `✓ Set to "${value}" — live for all users`; status.style.color = '#80e060'; }
    } else {
      if (status) { status.textContent = data.error || 'Failed'; status.style.color = '#e04040'; }
    }
  } catch(e) {
    if (status) { status.textContent = 'Error: ' + e.message; status.style.color = '#e04040'; }
  }
}

function pinKey(k){if(pinBuffer.length>=4)return;pinBuffer+=k;updatePinDots();if(pinBuffer.length===4)setTimeout(submitPin,120);}
function pinDel(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();document.getElementById('pin-error').textContent='';}
function updatePinDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).className='pin-dot'+(i<pinBuffer.length?' filled':'');}
async function submitPin(){
  try{
    const r=await fetch('/mobile/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pinBuffer})});
    if(r.ok){document.getElementById('pin-screen').style.display='none';document.getElementById('app').classList.add('visible');boot();}
    else{document.getElementById('pin-error').textContent='Wrong PIN';pinBuffer='';updatePinDots();}
  }catch(e){document.getElementById('pin-error').textContent='Server error';pinBuffer='';updatePinDots();}
}

async function boot(){selectProfile('keshawn');pingAllServers();setInterval(pingAllServers,30000);}

function selectProfile(id){
  currentProfile=CREW.find(c=>c.id===id);
  document.documentElement.style.setProperty('--acc',currentProfile.color);
  renderProfileBar();loadAll();connectWS();
}

function renderProfileBar(){
  document.getElementById('profile-bar').innerHTML=CREW.map(c=>
    `<div class="p-chip ${currentProfile?.id===c.id?'active':''}" style="--chip-color:${c.color}" onclick="selectProfile('${c.id}')">
      <div class="p-chip-dot" style="background:${c.color}"></div>${c.name}</div>`
  ).join('');
}

async function loadAll(){
  await Promise.all([loadPresence(),loadProfiles(),loadWall(),loadLeaderboard(),loadGames(),fetchAppConfig()]);
  renderCurrentTab();
}

function renderCurrentTab(){
  ({god:renderGod,crew:renderCrew,games:renderGames,wall:renderWall,scores:renderScores,dms:renderContacts})[currentTab]?.();
}

function connectWS(){
  if(ws){try{ws.close();}catch(e){}}
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>ws.send(JSON.stringify({type:'identify',profile_id:currentProfile?.id}));
  ws.onmessage=(e)=>{
    try{
      const m=JSON.parse(e.data);
      if(m.type==='presence'){presence[m.profile_id]={...presence[m.profile_id],...m};if(currentTab==='crew'||currentTab==='god')renderCurrentTab();}
      if(m.type==='wall_post'&&m.post){wallPosts.unshift(m.post);if(currentTab==='wall')renderWall();}
      if(m.type==='reaction'){const p=wallPosts.find(x=>x.id===m.post_id);if(p)p.reactions=m.reactions;if(currentTab==='wall')renderWall();}
      if(m.type==='session'){loadLeaderboard().then(()=>{if(currentTab==='scores'||currentTab==='games'||currentTab==='god')renderCurrentTab();});}
      if(m.type==='message'&&m.message?.to_id===currentProfile?.id){
        if(activeConvo===m.message.from_id)appendBubble(m.message);
        else _unread[m.message.from_id]=(_unread[m.message.from_id]||0)+1;
      }
    }catch(e){}
  };
  ws.onclose=()=>setTimeout(connectWS,3000);
}

async function loadPresence(){try{const d=await fetch('/presence').then(r=>r.json());for(const p of d)presence[p.profile_id]=p;}catch(e){}}
async function loadProfiles(){try{const d=await fetch('/profiles').then(r=>r.json());for(const p of d)profiles[p.id]=p;}catch(e){}}
async function loadWall(){try{wallPosts=await fetch('/wall').then(r=>r.json());}catch(e){}}
async function loadLeaderboard(){try{_lbRows=await fetch('/sessions/leaderboard').then(r=>r.json());}catch(e){}}
async function loadGames(){try{allGames=await fetch('/games').then(r=>r.json());}catch(e){}}

async function pingAllServers(){
  for(const srv of SERVERS){
    const base=srv.url||location.origin;
    const t0=Date.now();
    try{
      const r=await fetch(`${base}/health`,{signal:AbortSignal.timeout(5000)});
      serverStatus[srv.id]=r.ok?{online:true,ping:Date.now()-t0}:{online:false,ping:null};
    }catch(e){serverStatus[srv.id]={online:false,ping:null};}
  }
  if(currentTab==='god')renderGod();
}

const TAB_NAMES=['god','crew','games','wall','scores','dms'];
function switchTab(name){
  currentTab=name;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',TAB_NAMES[i]===name));
  TAB_NAMES.forEach(t=>document.getElementById('tab-'+t).style.display=t===name?'block':'none');
  if(name==='dms')activeConvo=null;
  renderCurrentTab();
}

async function renderGod(){
  const now=Math.floor(Date.now()/1000);
  const serversHTML=SERVERS.map(srv=>{
    const s=serverStatus[srv.id];
    const sc=!s?'checking':s.online?'online':'offline';
    const st=!s?'Checking...':s.online?'Online':'Offline';
    return `<div class="server-card">
      <div class="server-icon" style="background:rgba(255,255,255,0.05)">${srv.emoji}</div>
      <div style="flex:1;min-width:0"><div class="server-name">${srv.name}</div><div class="server-url">${(srv.url||location.origin).replace('https://','')}</div></div>
      <div class="server-status"><div class="status-pill ${sc}">${st}</div><div class="ping-lbl">${s?.ping?s.ping+'ms':'—'}</div></div>
    </div>`;
  }).join('');

  const onlineCrew=CREW.filter(c=>{const p=presence[c.id];return p?.online===1&&(now-(p.updated_at||0))<90;});
  const byGame={};
  for(const c of CREW){const p=presence[c.id];if(p?.online===1&&p.game_id&&(now-(p.updated_at||0))<90){byGame[p.game_id]=(byGame[p.game_id]||0)+1;}}

  const lastByGame={};
  for(const s of _lbRows){if(!lastByGame[s.game_id])lastByGame[s.game_id]=s;}

  const gameQuick=allGames.map(g=>{
    const online=byGame[g.id]||0;
    const last=lastByGame[g.id];
    const lc=last?CREW.find(c=>c.id===last.profile_id):null;
    return `<div class="card-row">
      <span class="row-label">${gameEmoji(g.id)} ${g.name}</span>
      <span class="row-val ${online>0?'green':'muted'}">${online>0?online+' playing':'—'}</span>
    </div>
    ${last?`<div class="card-row" style="background:rgba(0,0,0,0.15)">
      <span class="row-label" style="font-size:10px">Last — ${lc?.name||last.profile_id}</span>
      <span class="row-val" style="font-size:10px">${last.score.toLocaleString()} · ${timeAgo(last.created_at)}</span>
    </div>`:''}`;
  }).join('');

  const totalXP=Object.values(profiles).reduce((a,p)=>a+(p.np||p.xp||0),0);

  document.getElementById('tab-god').innerHTML=`
    <div class="sec">
      <div class="sec-label">⚡ Launcher Title</div>
      <div class="card">
        <div class="card-row" style="flex-direction:column;align-items:flex-start;gap:8px">
          <div style="font-size:11px;color:rgba(255,255,255,0.5)">Changes the top-left title for ALL users live</div>
          <input id="title-input" type="text" maxlength="32" placeholder="N GAMES"
            style="width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:6px;
                   padding:8px 10px;color:#fff;font-size:14px;font-weight:700;letter-spacing:0.05em;outline:none"
            value="${_appConfig.launcher_title||'N GAMES'}">
          <button onclick="setLauncherTitle()"
            style="width:100%;padding:8px;background:var(--acc,#80e060);color:#000;border:none;border-radius:6px;
                   font-size:12px;font-weight:700;cursor:pointer">SET TITLE</button>
          <div id="title-status" style="font-size:10px;color:rgba(255,255,255,0.4)"></div>
        </div>
      </div>
    </div>
    <div class="sec"><div class="sec-label">Servers (${SERVERS.length})</div>${serversHTML}</div>
    <div class="sec"><div class="sec-label">Network</div><div class="card">
      <div class="card-row"><span class="row-label">Crew online</span><span class="row-val ${onlineCrew.length>0?'green':'muted'}">${onlineCrew.length} / ${CREW.length}</span></div>
      <div class="card-row"><span class="row-label">WebSocket</span><span class="row-val ${ws&&ws.readyState===1?'green':'gold'}">${ws&&ws.readyState===1?'Connected':'Reconnecting'}</span></div>
      <div class="card-row"><span class="row-label">Total network NP</span><span class="row-val gold">${totalXP.toLocaleString()}</span></div>
      <div class="card-row"><span class="row-label">Sessions logged</span><span class="row-val">${_lbRows.length}</span></div>
    </div></div>
    <div class="sec"><div class="sec-label">Games</div><div class="card">${gameQuick||'<div class="card-row"><span class="row-label muted">No games</span></div>'}</div></div>
    <div class="sec"><div class="sec-label">Crew</div>
      ${CREW.map(c=>{
        const p=presence[c.id]||{};const prof=profiles[c.id]||{};
        const online=p.online===1&&(now-(p.updated_at||0))<90;
        const state=summarizeState(p.game_state);
        const status=online?(p.game_id?`${gameShortName(p.game_id)}${state?' · '+state:''}`:'Launcher'):'Offline';
        return `<div class="crew-card">
          <div style="display:flex;align-items:center;gap:11px">
            <div class="crew-av ${online?'online':'offline'}" style="background:${c.color}22;color:${c.color};--av-color:${c.color}">${c.initial}<div class="av-dot"></div></div>
            <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">${c.name}</div><div style="font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${status}</div></div>
            <div style="text-align:right;flex-shrink:0"><div style="font-size:11px;font-weight:600;color:var(--text2)">Lv ${prof.level||1}</div><div style="font-size:9px;color:var(--text3)">${(prof.xp||0).toLocaleString()} XP</div></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderCrew(){
  const now=Math.floor(Date.now()/1000);
  document.getElementById('tab-crew').innerHTML=CREW.map(c=>{
    const p=presence[c.id]||{};const prof=profiles[c.id]||{};
    const online=p.online===1&&(now-(p.updated_at||0))<90;
    const state=summarizeState(p.game_state);
    const status=online?(p.game_id?`${gameShortName(p.game_id)}${state?' · '+state:''}`:'Online'):'Offline';
    const lv=prof.level||1;const np=prof.np||prof.xp||0;
    const NP_T=(l)=>l<=1?0:l<=25?Math.floor(300*Math.pow(l-1,1.9)):(Math.floor(300*Math.pow(24,1.9))+Math.floor(5000*Math.pow(l-25,2.1)));
    const pct=lv>=50?100:Math.min(100,Math.round((np-NP_T(lv))/(NP_T(lv+1)-NP_T(lv))*100)||0);
    return `<div class="crew-card" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:10px">
        <div class="crew-av ${online?'online':'offline'}" style="background:${c.color}22;color:${c.color};--av-color:${c.color}">${c.initial}<div class="av-dot"></div></div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">${c.name} <span style="color:var(--text3);font-weight:400">${c.suit}</span></div><div style="font-size:10px;color:var(--text3);margin-top:2px">${status}</div></div>
        <div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--text2)">Lv ${lv}</div><div style="font-size:10px;color:var(--text3)">${np.toLocaleString()} NP</div></div>
      </div>
      <div style="background:rgba(255,255,255,0.06);border-radius:3px;height:3px;overflow:hidden;margin-bottom:8px">
        <div style="height:100%;width:${pct}%;background:${c.color};border-radius:3px"></div>
      </div>
      <div style="font-size:10px;color:var(--text3)">Balance: <b style="color:${c.color}">₵${(prof.casino_balance||1000).toLocaleString()}</b></div>
    </div>`;
  }).join('');
}

async function renderGames(){
  const now=Math.floor(Date.now()/1000);
  const byGame={};
  for(const c of CREW){const p=presence[c.id]||{};if(p.online===1&&p.game_id&&(now-(p.updated_at||0))<90){if(!byGame[p.game_id])byGame[p.game_id]=[];byGame[p.game_id].push({crew:c,state:p.game_state});}}
  const sessionsByGame={};
  for(const s of _lbRows){if(!sessionsByGame[s.game_id])sessionsByGame[s.game_id]=[];if(sessionsByGame[s.game_id].length<5)sessionsByGame[s.game_id].push(s);}

  document.getElementById('tab-games').innerHTML=allGames.map(g=>{
    const players=byGame[g.id]||[];
    const gameSessions=sessionsByGame[g.id]||[];
    const ownerCrew=CREW.find(c=>c.id===g.owner);
    const playersHTML=players.length?players.map(({crew,state})=>{
      const st=summarizeState(state);
      return `<div class="card-row">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:22px;height:22px;border-radius:50%;background:${crew.color}22;color:${crew.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700">${crew.initial}</div>
          <span style="font-size:12px;color:var(--text2)">${crew.name}</span>
        </div>
        <span style="font-size:10px;font-weight:600;color:var(--green)">${st||'In game'}</span>
      </div>`;
    }).join(''):`<div class="card-row"><span style="font-size:11px;color:var(--text3)">No one playing</span></div>`;

    const sessionsHTML=gameSessions.length?gameSessions.map(s=>{
      const c=CREW.find(x=>x.id===s.profile_id);
      return `<div class="session-row">
        <div class="session-av" style="background:${c?.color||'#fff'}22;color:${c?.color||'#fff'}">${c?.initial||'?'}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--acc)">${s.score.toLocaleString()}</div><div style="font-size:10px;color:var(--text3)">${c?.name||s.profile_id}</div></div>
        <div style="font-size:10px;color:var(--text3)">${timeAgo(s.created_at)}</div>
      </div>`;
    }).join(''):`<div class="session-row"><span style="font-size:11px;color:var(--text3)">No sessions yet</span></div>`;

    return `<div class="game-card">
      <div class="game-hdr">
        <span style="font-size:20px">${gameEmoji(g.id)}</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:700">${g.name}</div><div style="font-size:10px;color:var(--text3)">by ${ownerCrew?.name||g.owner} · ${g.status}</div></div>
        <span style="font-size:10px;font-weight:700;color:${players.length?'var(--green)':'var(--text3)'}">${players.length?players.length+' playing':'offline'}</span>
      </div>
      <div style="border-bottom:1px solid var(--border)">
        <div style="font-size:9px;color:var(--text3);padding:7px 13px 4px;letter-spacing:0.08em;text-transform:uppercase">Now Playing</div>
        ${playersHTML}
      </div>
      <div>
        <div style="font-size:9px;color:var(--text3);padding:7px 13px 4px;letter-spacing:0.08em;text-transform:uppercase">Recent Sessions</div>
        ${sessionsHTML}
      </div>
    </div>`;
  }).join('')||'<div class="empty">No games registered</div>';
}

function renderWall(){
  const suits=['♦','♥','♠','♣'];
  const postsHTML=wallPosts.slice(0,30).map(post=>{
    const r=post.reactions||{};
    const reactHTML=suits.map(s=>{const cnt=(r[s]||[]).length;const act=(r[s]||[]).includes(currentProfile?.id);return `<button class="react-btn ${act?'active':''}" onclick="react(${post.id},'${s}')">${s}${cnt?' '+cnt:''}</button>`;}).join('');
    return `<div class="wall-post">
      <div class="post-hdr">
        <div class="post-av" style="background:${post.color}22;color:${post.color}">${post.initial}</div>
        <div style="flex:1"><div style="font-size:12px;font-weight:700">${post.name}</div><div style="font-size:9px;color:var(--text3)">${timeAgo(post.created_at)}</div></div>
        ${post.game_id?`<div style="font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.06);color:var(--text2);text-transform:uppercase">${gameShortName(post.game_id)}</div>`:''}
      </div>
      <div class="post-content">${esc(post.content)}</div>
      <div class="post-reactions">${reactHTML}</div>
    </div>`;
  }).join('');
  document.getElementById('tab-wall').innerHTML=`
    <div class="wall-composer"><textarea id="wall-input" placeholder="Post to the wall..."></textarea><div class="wall-footer"><button class="post-btn" onclick="submitPost()">Post</button></div></div>
    ${postsHTML||'<div class="empty">No posts yet</div>'}`;
}

async function submitPost(){const inp=document.getElementById('wall-input');const content=inp?.value?.trim();if(!content||!currentProfile)return;inp.value='';try{await fetch('/wall/post',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile_id:currentProfile.id,content,game_id:'mobile'})});await loadWall();renderWall();}catch(e){}}
async function react(postId,suit){if(!currentProfile)return;try{const res=await fetch(`/wall/${postId}/react`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile_id:currentProfile.id,suit})}).then(r=>r.json());const p=wallPosts.find(x=>x.id===postId);if(p)p.reactions=res.reactions;renderWall();}catch(e){}}

function renderScores(){
  if(!_lbRows.length){document.getElementById('tab-scores').innerHTML='<div class="empty">No scores yet</div>';return;}
  document.getElementById('tab-scores').innerHTML=_lbRows.slice(0,25).map((row,i)=>{
    const c=CREW.find(x=>x.id===row.profile_id);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    return `<div class="lb-row">
      <div class="lb-rank">${medal}</div>
      <div class="lb-av" style="background:${c?.color||'#fff'}22;color:${c?.color||'#fff'}">${c?.initial||'?'}</div>
      <div style="flex:1"><div style="font-size:12px;font-weight:600">${row.name||row.profile_id}</div><div style="font-size:9px;color:var(--text3)">${gameShortName(row.game_id)}</div></div>
      <div style="font-size:14px;font-weight:700;color:var(--acc)">${row.score.toLocaleString()}</div>
    </div>`;
  }).join('');
}

async function renderContacts(){
  activeConvo=null;
  try{const d=await fetch(`/messages/unread/${currentProfile.id}`).then(r=>r.json());_unread={};for(const row of d)_unread[row.from_id]=row.count;}catch(e){}
  document.getElementById('tab-dms').innerHTML=CREW.filter(c=>c.id!==currentProfile?.id).map(c=>
    `<div class="msg-contact" onclick="openConvo('${c.id}')">
      <div class="msg-av" style="background:${c.color}22;color:${c.color}">${c.initial}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${c.name}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${presence[c.id]?.online?'● Online':'Offline'}</div></div>
      ${_unread[c.id]?'<div class="unread-dot"></div>':''}
    </div>`
  ).join('');
}

async function openConvo(profileId){
  activeConvo=profileId;const c=CREW.find(x=>x.id===profileId);
  try{await fetch('/messages/read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reader_id:currentProfile.id,from_id:profileId})});delete _unread[profileId];}catch(e){}
  let msgs=[];try{msgs=await fetch(`/messages/${currentProfile.id}/${profileId}`).then(r=>r.json());}catch(e){}
  document.getElementById('tab-dms').innerHTML=`
    <div class="convo-hdr" onclick="renderContacts()"><span class="convo-back">‹</span><div class="msg-av" style="background:${c.color}22;color:${c.color}">${c.initial}</div><span style="font-size:15px;font-weight:700">${c.name}</span></div>
    <div class="msg-history" id="msg-history">${msgs.map(m=>{const me=m.from_id===currentProfile.id;return `<div class="msg-bubble ${me?'me':'them'}">${esc(m.content)}<div class="msg-time">${timeAgo(m.created_at)}</div></div>`;}).join('')||'<div class="empty">Say hi!</div>'}</div>
    <div class="msg-input-row"><input class="msg-input" id="msg-input" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMsg()"><button class="msg-send" onclick="sendMsg()">↑</button></div>`;
  setTimeout(()=>{const h=document.getElementById('msg-history');if(h)h.scrollTop=h.scrollHeight;},50);
}

function appendBubble(m){const h=document.getElementById('msg-history');if(!h)return;const me=m.from_id===currentProfile?.id;const d=document.createElement('div');d.className=`msg-bubble ${me?'me':'them'}`;d.innerHTML=`${esc(m.content)}<div class="msg-time">just now</div>`;h.appendChild(d);h.scrollTop=h.scrollHeight;}
async function sendMsg(){const inp=document.getElementById('msg-input');const content=inp?.value?.trim();if(!content||!activeConvo||!currentProfile)return;inp.value='';try{await fetch('/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from_id:currentProfile.id,to_id:activeConvo,content})});appendBubble({from_id:currentProfile.id,to_id:activeConvo,content,created_at:Math.floor(Date.now()/1000)});}catch(e){}}

function gameShortName(id){return{'cuunsurf':'Surf','case-sim':'Cases','project-x':'Arena','chaos-casino':'Casino','chaos-holdem':'Casino','blacks-dungeon':'Shape','nkart':'N Kart','launcher':'Launcher','mobile':'Mobile'}[id]||id;}
function gameEmoji(id){return{'cuunsurf':'🏄','case-sim':'📦','project-x':'🎯','chaos-casino':'🃏','chaos-holdem':'🃏','blacks-dungeon':'🎮','nkart':'🏎️'}[id]||'🎲';}
function summarizeState(s){if(!s)return '';if(typeof s==='string'){try{s=JSON.parse(s);}catch(e){return s;}}if(s.screen==='in_run')return `Hand ${s.hand||0} · ${(s.chips||0).toLocaleString()}c`;if(s.screen==='in_boss')return 'Boss!';if(s.screen==='in_shop')return 'Shop';if(s.screen==='in_menu')return 'Menu';return s.screen||'';}
function timeAgo(ts){const s=Math.floor(Date.now()/1000)-ts;if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function esc(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
